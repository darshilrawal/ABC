{% extends "admin/change_list.html" %}
{% load static %}

{% block content_title %}
<h1
    style="color: var(--admin-text-primary); font-size: 2rem; font-weight: 700; margin-bottom: 8px; font-family: var(--admin-font-family); display: flex; align-items: center; gap: 12px;">
    <i class="fas fa-tshirt" style="color: var(--admin-accent-primary);"></i>
    {{ title }}
</h1>
<p style="color: var(--admin-text-secondary); font-size: 1rem; margin-bottom: 24px;">
    Manage your product catalog, pricing, and inventory
</p>
{% endblock %}

{% block search %}
<div id="toolbar" style="background: transparent; border: none; padding: 0; margin-bottom: 20px;">
    <form id="changelist-search" method="get">
        <div><!-- Inner div for flex layout -->
            <label for="searchbar"><img src="{% static " admin/img/search.svg" %}" alt="Search"></label>
            <input type="text" size="40" name="{{ search_var }}" value="{{ cl.query }}" id="searchbar"
                placeholder="Search by name, description, or fabric..." autofocus>
            <input type="submit" value="Search">
        </div>
    </form>
</div>
{% endblock %}
