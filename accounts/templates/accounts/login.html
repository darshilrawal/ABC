{% extends 'base.html' %}
{% load static %}

{% block title %}Login - ABC | Atal Bharat Creation{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-icon">
                    <i class="fas fa-sign-in-alt"></i>
                </div>
                <h1>Welcome Back</h1>
                <p>Login to access your account and manage orders</p>
            </div>

            <form method="POST" class="auth-form">
                {% csrf_token %}

                <div class="form-group">
                    <label class="form-label" for="email">
                        <i class="fas fa-envelope"></i> Email
                    </label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="Enter your email"
                        required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <div class="password-input-wrapper">
                        <input type="password" id="password" name="password" class="form-control"
                            placeholder="Enter your password" required>
                        <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                            <i class="fas fa-eye"></i>
                            <i class="fas fa-eye-slash"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 20px;">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="{% url 'accounts:register' %}">Register here</a></p>
            </div>
        </div>
    </div>
</section>

<style>
    .auth-section {
        min-height: calc(100vh - 200px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 60px 0;
        background: var(--bg-primary);
    }

    .auth-card {
        background: var(--bg-secondary);
        border-radius: var(--radius-lg);
        padding: 50px;
        max-width: 450px;
        width: 100%;
        margin: 0 auto;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        border: 1px solid var(--border-color);
    }

    .auth-header {
        text-align: center;
        margin-bottom: 35px;
    }

    .auth-icon {
        width: 80px;
        height: 80px;
        background: var(--accent-gradient);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
    }

    .auth-icon i {
        font-size: 2rem;
        color: white;
    }

    .auth-header h1 {
        font-size: 1.8rem;
        margin-bottom: 10px;
        color: var(--text-primary);
    }

    .auth-header p {
        color: var(--text-secondary);
    }

    .auth-form .form-group {
        margin-bottom: 20px;
    }

    .auth-form .form-label {
        display: block;
        margin-bottom: 8px;
        color: var(--text-secondary);
        font-weight: 500;
    }

    .auth-form .form-label i {
        margin-right: 8px;
        color: var(--accent-primary);
    }

    .auth-footer {
        text-align: center;
        margin-top: 25px;
        padding-top: 25px;
        border-top: 1px solid var(--border-color);
    }

    .auth-footer a {
        color: var(--accent-primary);
        font-weight: 600;
    }

    .auth-footer a:hover {
        text-decoration: underline;
    }
</style>
{% endblock %}
